# Grafana Dashboard Provisioning Configuration

apiVersion: 1

providers:
  - name: 'Netskope SDET Dashboards'
    orgId: 1
    folder: 'Netskope SDET'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards