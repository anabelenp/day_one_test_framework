# Production Environment Configuration
# Read-only production monitoring and health checks

ENVIRONMENT: production
MOCK_MODE: false
READ_ONLY_MODE: true

# Production Service Endpoints (Read-Only Access)
REDIS_HOST: redis-prod-cluster.netskope-production.svc.cluster.local
REDIS_PORT: 6379
REDIS_PASSWORD: ${REDIS_PROD_PASSWORD}  # From external secret management
REDIS_SENTINEL_HOSTS: redis-sentinel-prod.netskope-production.svc.cluster.local:26379
REDIS_MASTER_NAME: prod-master
REDIS_DB: 0
REDIS_SSL: true
REDIS_POOL_SIZE: 10  # Limited for read-only
REDIS_MAX_CONNECTIONS: 20
REDIS_READ_ONLY: true

KAFKA_BOOTSTRAP_SERVERS: kafka-prod-cluster.netskope-production.svc.cluster.local:9093
KAFKA_SECURITY_PROTOCOL: SASL_SSL
KAFKA_SASL_MECHANISM: PLAIN
KAFKA_SASL_USERNAME: ${KAFKA_PROD_USERNAME}  # From external secret management
KAFKA_SASL_PASSWORD: ${KAFKA_PROD_PASSWORD}
KAFKA_CONSUMER_GROUP: netskope-prod-monitoring
KAFKA_AUTO_OFFSET_RESET: latest
KAFKA_ENABLE_AUTO_COMMIT: true
KAFKA_SESSION_TIMEOUT_MS: 30000
KAFKA_HEARTBEAT_INTERVAL_MS: 3000
KAFKA_READ_ONLY: true

MONGODB_HOST: mongodb-prod-cluster.netskope-production.svc.cluster.local
MONGODB_PORT: 27017
MONGODB_USERNAME: ${MONGODB_PROD_USERNAME}  # From external secret management
MONGODB_PASSWORD: ${MONGODB_PROD_PASSWORD}
MONGODB_DATABASE: netskope_production
MONGODB_AUTH_SOURCE: admin
MONGODB_REPLICA_SET: prod-rs0
MONGODB_SSL: true
MONGODB_POOL_SIZE: 10  # Limited for read-only
MONGODB_MAX_POOL_SIZE: 20
MONGODB_CONNECT_TIMEOUT_MS: 30000
MONGODB_SERVER_SELECTION_TIMEOUT_MS: 30000
MONGODB_READ_ONLY: true

# Production Netskope API (Read-Only Monitoring)
NETSKOPE_BASE_URL: https://prod-api.company.goskope.com
API_KEY: ${NETSKOPE_PROD_API_KEY}  # From external secret management
API_TIMEOUT: 60
API_RETRIES: 3
API_RETRY_BACKOFF: exponential
API_MAX_RETRY_DELAY: 120
API_JWT_ENABLED: true
API_RATE_LIMIT: 100  # Conservative for production
API_BURST_LIMIT: 50
API_READ_ONLY: true

# Production AWS Services
AWS_REGION: us-east-1
AWS_ENDPOINT_URL: null  # Real AWS production
AWS_ACCESS_KEY_ID: ${AWS_PROD_ACCESS_KEY_ID}
AWS_SECRET_ACCESS_KEY: ${AWS_PROD_SECRET_ACCESS_KEY}
AWS_S3_BUCKET: netskope-production-data
AWS_KMS_KEY_ID: ${AWS_PROD_KMS_KEY_ID}
AWS_CLOUDWATCH_LOG_GROUP: /netskope/production/logs
AWS_READ_ONLY: true

# Production GCP Services
GCP_PROJECT_ID: netskope-production
GOOGLE_APPLICATION_CREDENTIALS: ${GCP_PROD_CREDENTIALS_PATH}
GCP_STORAGE_BUCKET: netskope-production-storage
GCP_PUBSUB_TOPIC: netskope-production-events
GCP_BIGQUERY_DATASET: netskope_production_analytics
GCP_READ_ONLY: true

# Production Monitoring (Read-Only Access)
PROMETHEUS_URL: https://prometheus-prod.company.com
GRAFANA_URL: https://grafana-prod.company.com
JAEGER_URL: https://jaeger-prod.company.com
ALERTMANAGER_URL: https://alertmanager-prod.company.com
MONITORING_READ_ONLY: true

# Metrics Collection (Read-Only)
METRICS_ENABLED: true
METRICS_PORT: 9090
METRICS_PATH: /metrics
METRICS_INTERVAL: 60  # Less frequent for production
METRICS_RETENTION: 90d
METRICS_DETAILED: false  # Minimal for production
METRICS_CUSTOM_LABELS: environment=production,cluster=prod-k8s
METRICS_READ_ONLY: true

# Distributed Tracing (Read-Only)
TRACING_ENABLED: true
JAEGER_AGENT_HOST: jaeger-prod.company.com
JAEGER_AGENT_PORT: 6831
JAEGER_COLLECTOR_ENDPOINT: https://jaeger-prod.company.com:14268/api/traces
JAEGER_SAMPLER_TYPE: probabilistic
JAEGER_SAMPLER_PARAM: 0.01  # Very low sampling for production
JAEGER_SERVICE_NAME: netskope-sdet-production-monitor
JAEGER_TAGS: environment=production,version=1.0.0,mode=read-only
JAEGER_READ_ONLY: true

# Production Test Configuration (Health Checks Only)
TEST_TIMEOUT: 300
TEST_RETRIES: 3
TEST_PARALLEL_WORKERS: 2  # Limited for production
TEST_FAIL_FAST: true
TEST_VERBOSE: false
TEST_REPORT_FORMAT: json
TEST_COVERAGE_THRESHOLD: 0  # No coverage in production
TEST_PERFORMANCE_BASELINE: false
TEST_READ_ONLY: true
TEST_HEALTH_CHECKS_ONLY: true

# Production Logging Configuration
LOG_LEVEL: WARN  # Minimal logging for production
LOG_FORMAT: json
LOG_OUTPUT: stdout
LOG_FILE: /var/log/netskope-sdet/production.log
LOG_ROTATION: daily
LOG_RETENTION: 90d
LOG_MAX_SIZE: 50MB
LOG_STRUCTURED: true
LOG_CORRELATION_ID: true
LOG_SENSITIVE_DATA: false

# Enhanced Security Configuration
SECURITY_TLS_ENABLED: true
SECURITY_TLS_MIN_VERSION: "1.3"
SECURITY_MUTUAL_TLS: true
SECURITY_CERT_PATH: ${PROD_TLS_CERT_PATH}
SECURITY_KEY_PATH: ${PROD_TLS_KEY_PATH}
SECURITY_CA_PATH: ${PROD_TLS_CA_PATH}
SECURITY_ENCRYPTION_AT_REST: true
SECURITY_AUDIT_LOGGING: true
SECURITY_ACCESS_CONTROL: strict-rbac
SECURITY_SESSION_TIMEOUT: 1800  # 30 minutes
SECURITY_PASSWORD_POLICY: enterprise
SECURITY_MFA_REQUIRED: true

# Performance Configuration (Conservative)
PERFORMANCE_MAX_CONNECTIONS: 50  # Limited for production
PERFORMANCE_CONNECTION_POOL_SIZE: 10
PERFORMANCE_REQUEST_TIMEOUT: 60
PERFORMANCE_MAX_RETRIES: 3
PERFORMANCE_CIRCUIT_BREAKER: true
PERFORMANCE_RATE_LIMITING: true
PERFORMANCE_CACHING: true
PERFORMANCE_COMPRESSION: true

# Health Check Configuration (Comprehensive)
HEALTH_CHECK_INTERVAL: 60  # Every minute
HEALTH_CHECK_TIMEOUT: 10
HEALTH_CHECK_RETRIES: 3
HEALTH_CHECK_ENDPOINTS: /health,/ready,/live,/metrics
HEALTH_CHECK_DETAILED: true
HEALTH_CHECK_DEPENDENCIES: true
HEALTH_CHECK_EXTERNAL_SERVICES: true

# Kubernetes Configuration (Production)
KUBERNETES_NAMESPACE: netskope-production
KUBERNETES_SERVICE_ACCOUNT: production-monitor-service-account
KUBERNETES_IN_CLUSTER: true
KUBERNETES_CONFIG_PATH: ${PROD_KUBECONFIG_PATH}
KUBERNETES_API_VERSION: v1
KUBERNETES_RESOURCE_QUOTAS: true
KUBERNETES_NETWORK_POLICIES: true
KUBERNETES_READ_ONLY: true

# Data Management Configuration (Read-Only)
DATA_RETENTION_POLICY: 365d
DATA_BACKUP_ENABLED: false  # No backup from monitoring
DATA_BACKUP_SCHEDULE: null
DATA_BACKUP_RETENTION: null
DATA_ENCRYPTION_ENABLED: true
DATA_COMPRESSION_ENABLED: true
DATA_VALIDATION_STRICT: true
DATA_AUDIT_TRAIL: true
DATA_READ_ONLY: true

# Feature Flags (Production)
FEATURE_DISTRIBUTED_TRACING: true
FEATURE_METRICS_COLLECTION: true
FEATURE_ADVANCED_LOGGING: false  # Minimal logging
FEATURE_CHAOS_TESTING: false  # Never in production
FEATURE_LOAD_TESTING: false  # Never in production
FEATURE_SECURITY_SCANNING: false  # External tools only
FEATURE_COMPLIANCE_TESTING: true
FEATURE_PERFORMANCE_PROFILING: false
FEATURE_READ_ONLY_MODE: true

# Compliance and Governance (Strict)
COMPLIANCE_SOC2: true
COMPLIANCE_GDPR: true
COMPLIANCE_HIPAA: true
COMPLIANCE_PCI_DSS: true
COMPLIANCE_ISO27001: true
COMPLIANCE_AUDIT_LOGGING: true
COMPLIANCE_DATA_CLASSIFICATION: true
COMPLIANCE_ACCESS_REVIEWS: true
COMPLIANCE_CONTINUOUS_MONITORING: true

# Notification Configuration (Critical Only)
NOTIFICATIONS_ENABLED: true
SLACK_WEBHOOK_URL: ${PROD_SLACK_WEBHOOK_URL}
EMAIL_NOTIFICATIONS: true
EMAIL_SMTP_HOST: ${PROD_SMTP_HOST}
EMAIL_SMTP_PORT: 587
EMAIL_SMTP_USERNAME: ${PROD_SMTP_USERNAME}
EMAIL_SMTP_PASSWORD: ${PROD_SMTP_PASSWORD}
NOTIFICATION_ON_FAILURE: true
NOTIFICATION_ON_SUCCESS: false
NOTIFICATION_ON_PERFORMANCE_DEGRADATION: true
NOTIFICATION_ESCALATION: true
NOTIFICATION_CRITICAL_ONLY: true

# Integration Configuration (Production)
INTEGRATION_JIRA_ENABLED: true
INTEGRATION_JIRA_URL: ${PROD_JIRA_URL}
INTEGRATION_JIRA_USERNAME: ${PROD_JIRA_USERNAME}
INTEGRATION_JIRA_API_TOKEN: ${PROD_JIRA_API_TOKEN}
INTEGRATION_CONFLUENCE_ENABLED: true
INTEGRATION_SERVICENOW_ENABLED: true
INTEGRATION_PAGERDUTY_ENABLED: true

# Incident Response Configuration
INCIDENT_RESPONSE_ENABLED: true
INCIDENT_AUTO_CREATION: true
INCIDENT_ESCALATION_TIMEOUT: 300  # 5 minutes
INCIDENT_SEVERITY_MAPPING: true
INCIDENT_RUNBOOK_AUTOMATION: true
INCIDENT_POST_MORTEM_REQUIRED: true

# Monitoring Thresholds (Production)
ALERT_CPU_THRESHOLD: 80
ALERT_MEMORY_THRESHOLD: 85
ALERT_DISK_THRESHOLD: 90
ALERT_NETWORK_THRESHOLD: 80
ALERT_ERROR_RATE_THRESHOLD: 1
ALERT_RESPONSE_TIME_THRESHOLD: 5000  # 5 seconds
ALERT_AVAILABILITY_THRESHOLD: 99.9

# External Dependencies
EXTERNAL_VAULT_URL: ${VAULT_PROD_URL}
EXTERNAL_VAULT_TOKEN: ${VAULT_PROD_TOKEN}
EXTERNAL_LDAP_URL: ${LDAP_PROD_URL}
EXTERNAL_SSO_PROVIDER: ${SSO_PROD_PROVIDER}
EXTERNAL_CERTIFICATE_AUTHORITY: ${CA_PROD_URL}

# Disaster Recovery Configuration
DISASTER_RECOVERY_ENABLED: true
DR_RTO_TARGET: 2h  # Recovery Time Objective
DR_RPO_TARGET: 15m  # Recovery Point Objective
DR_BACKUP_FREQUENCY: continuous
DR_FAILOVER_TESTING: monthly
DR_DOCUMENTATION_REQUIRED: true

# Change Management
CHANGE_MANAGEMENT_ENABLED: true
CHANGE_APPROVAL_REQUIRED: true
CHANGE_ROLLBACK_PLAN_REQUIRED: true
CHANGE_TESTING_REQUIRED: true
CHANGE_DOCUMENTATION_REQUIRED: true
CHANGE_WINDOW_ENFORCEMENT: true

# Production Restrictions
PRODUCTION_WRITE_OPERATIONS: false
PRODUCTION_DATA_MODIFICATION: false
PRODUCTION_SCHEMA_CHANGES: false
PRODUCTION_CONFIGURATION_CHANGES: false
PRODUCTION_DEPLOYMENT_CHANGES: false
PRODUCTION_EMERGENCY_ONLY: true