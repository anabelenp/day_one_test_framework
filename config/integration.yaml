# Integration Environment Configuration
# Kubernetes-based production-like environment for E3 testing

name: "Integration Environment"
environment: "integration"

# Service Configurations (Kubernetes services)
redis:
  host: "redis-service.netskope-integration.svc.cluster.local"
  port: 6379
  password: "integration-redis-2024"
  ssl_enabled: false
  connection_pool_size: 10
  timeout: 30

kafka:
  host: "kafka-service.netskope-integration.svc.cluster.local"
  port: 9092
  ssl_enabled: false
  connection_pool_size: 10
  timeout: 30

mongodb:
  host: "mongodb-service.netskope-integration.svc.cluster.local"
  port: 27017
  username: ""
  password: ""
  database: "netskope_integration"
  ssl_enabled: false
  connection_pool_size: 10
  timeout: 30

target_api:
  host: "mock-api-service.netskope-integration.svc.cluster.local"
  port: 8080
  ssl_enabled: false
  timeout: 30

# AWS Configuration
aws_config:
  region: "us-east-1"
  endpoint_url: "http://localstack-service.netskope-integration.svc.cluster.local:4566"
  access_key_id: "test"
  secret_access_key: "test"

# Monitoring Configuration
monitoring:
  enabled: true
  prometheus_url: "http://prometheus-service.netskope-integration.svc.cluster.local:9090"
  grafana_url: "http://grafana-service.netskope-integration.svc.cluster.local:3000"
  jaeger_url: "http://jaeger-service.netskope-integration.svc.cluster.local:16686"
  metrics_port: 9090

# Security Configuration
security:
  tls_enabled: false
  mutual_tls: false
  encryption_at_rest: false
  audit_logging: true
  rate_limiting_enabled: true
  max_requests_per_minute: 1000

# Performance Configuration
performance:
  max_concurrent_connections: 100
  connection_pool_size: 10
  cache_ttl: 300
  batch_size: 100
  request_timeout: 30
  retry_attempts: 3
  retry_delay: 1

# Testing Configuration
testing:
  parallel_execution: true
  max_workers: 4
  test_timeout: 300
  cleanup_after_tests: true
  generate_reports: true

# Kubernetes Configuration
kubernetes:
  namespace: "netskope-integration"
  service_account: "test-runner-sa"
  in_cluster: true

# Data Configuration
data:
  retention_days: 30
  backup_enabled: false
  anonymization_enabled: true

# Logging Configuration
logging:
  level: "INFO"
  format: "json"
  file_rotation: true
  max_file_size: "10MB"
  max_files: 5
