server {
    listen 80;
    server_name localhost;

    # Health check endpoint
    location /health {
        return 200 '{"status": "healthy", "service": "netskope-api-mock"}';
        add_header Content-Type application/json;
    }

    # Mock API endpoints
    location /api/v2/events {
        return 200 '{"data": [], "status": "success", "message": "Mock events endpoint"}';
        add_header Content-Type application/json;
    }

    location /api/v2/alerts {
        return 200 '{"data": [], "status": "success", "message": "Mock alerts endpoint"}';
        add_header Content-Type application/json;
    }

    location /api/v2/reports {
        return 200 '{"data": [], "status": "success", "message": "Mock reports endpoint"}';
        add_header Content-Type application/json;
    }

    # Default response for any other endpoint
    location / {
        return 200 '{"status": "success", "message": "Netskope API Mock Service", "version": "1.0.0"}';
        add_header Content-Type application/json;
    }
}