# Mock/Testing Mode Configuration
# Set MOCK_MODE to true to use local mock servers instead of real APIs
MOCK_MODE: true

# Netskope Configuration (Mock Mode)
NETSKOPE_BASE_URL: "http://localhost:8080/mock-netskope"
API_KEY: "mock-api-key-12345"
TENANT_NAME: "demo-tenant"

# AWS Configuration (Mock Mode)
AWS_REGION: "us-east-1"
AWS_ACCESS_KEY_ID: "mock-aws-key"
AWS_SECRET_ACCESS_KEY: "mock-aws-secret"
AWS_ENDPOINT_URL: "http://localhost:4566"  # LocalStack endpoint

# GCP Configuration (Mock Mode)
GCP_PROJECT_ID: "mock-gcp-project-123"
GOOGLE_APPLICATION_CREDENTIALS: "./config/mock-gcp-credentials.json"

# Test Data Configuration
TEST_DATA_PATH: "./tests/data"
MOCK_RESPONSES_PATH: "./tests/mock_responses"

# Performance Testing
LOAD_TEST_USERS: 10
LOAD_TEST_DURATION: "30s"
