# Local Environment Configuration for Netskope SDET Framework
# NOTE: Sensitive values should be set via environment variables

name: "Local Development Environment"
environment: "local"

# Service Configurations
redis:
  host: "localhost"
  port: 6379
  ssl_enabled: false
  connection_pool_size: 10
  timeout: 30

kafka:
  host: "localhost"
  port: 9092
  ssl_enabled: false
  connection_pool_size: 10
  timeout: 30

mongodb:
  host: "localhost"
  port: 27017
  username: ${MONGO_USERNAME:-admin}
  password: ${MONGO_PASSWORD:-}
  database: "netskope_local"
  ssl_enabled: false
  connection_pool_size: 10
  timeout: 30

netskope_api:
  host: "localhost"
  port: 8080
  ssl_enabled: false
  timeout: 30

# AWS Configuration (LocalStack)
aws_config:
  region: "us-east-1"
  endpoint_url: "http://localhost:4566"
  access_key_id: ${AWS_ACCESS_KEY_ID:-test}
  secret_access_key: ${AWS_SECRET_ACCESS_KEY:-test}

# Monitoring Configuration
monitoring:
  enabled: true
  prometheus_url: "http://localhost:9090"
  grafana_url: "http://localhost:3000"
  jaeger_url: "http://localhost:16686"
  metrics_port: 8080

# Security Configuration
security:
  tls_enabled: false
  mutual_tls: false
  encryption_at_rest: false
  audit_logging: true
  rate_limiting_enabled: true
  max_requests_per_minute: 1000

# Performance Configuration
performance:
  max_concurrent_connections: 100
  connection_pool_size: 10
  cache_ttl: 300
  batch_size: 100
  request_timeout: 30
  retry_attempts: 3
  retry_delay: 1

# Testing Configuration
testing:
  parallel_execution: true
  max_workers: 4
  test_timeout: 300
  cleanup_after_tests: true
  generate_reports: true
  
# Data Configuration
data:
  retention_days: 30
  backup_enabled: false
  anonymization_enabled: true
  
# Logging Configuration
logging:
  level: "INFO"
  format: "json"
  file_rotation: true
  max_file_size: "10MB"
  max_files: 5