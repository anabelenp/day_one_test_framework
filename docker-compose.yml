version: '3'
services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  zookeeper:
    image: bitnami/zookeeper:latest
    ports:
      - "2181:2181"
  kafka:
    image: bitnami/kafka:latest
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    ports:
      - "9092:9092"
  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
