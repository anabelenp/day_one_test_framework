apiVersion: v1
kind: Namespace
metadata:
  name: netskope-staging
  labels:
    environment: staging
    team: sdet
    framework: netskope-sdet
    security-level: high
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: staging-quota
  namespace: netskope-staging
spec:
  hard:
    requests.cpu: "24"
    requests.memory: 48Gi
    limits.cpu: "48"
    limits.memory: 96Gi
    persistentvolumeclaims: "20"
    services: "30"
    secrets: "20"
    configmaps: "20"
    pods: "100"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: staging-limits
  namespace: netskope-staging
spec:
  limits:
  - default:
      cpu: "2"
      memory: "4Gi"
    defaultRequest:
      cpu: "200m"
      memory: "256Mi"
    type: Container
  - max:
      cpu: "8"
      memory: "16Gi"
    min:
      cpu: "50m"
      memory: "64Mi"
    type: Container
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: staging-network-policy
  namespace: netskope-staging
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: netskope-staging
    - namespaceSelector:
        matchLabels:
          name: monitoring
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: netskope-staging
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80