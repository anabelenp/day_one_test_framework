apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-ha-init
  namespace: netskope-staging
data:
  init-mongo.js: |
    // MongoDB HA Initialization Script for Staging Environment
    
    // Create databases with enhanced security
    db = db.getSiblingDB('netskope_staging');
    
    // Create collections with strict validation schemas
    db.createCollection('test_results', {
      validator: {
        $jsonSchema: {
          bsonType: 'object',
          required: ['test_id', 'timestamp', 'status', 'environment'],
          properties: {
            test_id: { bsonType: 'string', pattern: '^[a-zA-Z0-9_-]+$' },
            timestamp: { bsonType: 'date' },
            status: { enum: ['passed', 'failed', 'skipped', 'error'] },
            environment: { enum: ['staging', 'production'] },
            duration_ms: { bsonType: 'int', minimum: 0 },
            error_message: { bsonType: 'string' },
            test_suite: { bsonType: 'string' },
            tags: { bsonType: 'array', items: { bsonType: 'string' } }
          }
        }
      },
      validationLevel: 'strict',
      validationAction: 'error'
    });
    
    db.createCollection('security_events', {
      validator: {
        $jsonSchema: {
          bsonType: 'object',
          required: ['event_id', 'timestamp', 'event_type', 'severity'],
          properties: {
            event_id: { bsonType: 'string', pattern: '^evt_[a-zA-Z0-9_-]+$' },
            timestamp: { bsonType: 'date' },
            event_type: { enum: ['swg', 'dlp', 'ztna', 'firewall', 'auth', 'audit'] },
            severity: { enum: ['low', 'medium', 'high', 'critical'] },
            user_id: { bsonType: 'string' },
            source_ip: { bsonType: 'string' },
            details: { bsonType: 'object' },
            processed: { bsonType: 'bool' },
            archived: { bsonType: 'bool' }
          }
        }
      },
      validationLevel: 'strict',
      validationAction: 'error'
    });
    
    db.createCollection('policies', {
      validator: {
        $jsonSchema: {
          bsonType: 'object',
          required: ['policy_id', 'name', 'type', 'version'],
          properties: {
            policy_id: { bsonType: 'string', pattern: '^pol_[a-zA-Z0-9_-]+$' },
            name: { bsonType: 'string', minLength: 1, maxLength: 255 },
            type: { enum: ['swg', 'dlp', 'ztna', 'firewall'] },
            version: { bsonType: 'int', minimum: 1 },
            enabled: { bsonType: 'bool' },
            rules: { bsonType: 'array' },
            created_by: { bsonType: 'string' },
            created_at: { bsonType: 'date' },
            updated_at: { bsonType: 'date' }
          }
        }
      },
      validationLevel: 'strict',
      validationAction: 'error'
    });
    
    db.createCollection('users', {
      validator: {
        $jsonSchema: {
          bsonType: 'object',
          required: ['user_id', 'email', 'status'],
          properties: {
            user_id: { bsonType: 'string', pattern: '^usr_[a-zA-Z0-9_-]+$' },
            email: { bsonType: 'string', pattern: '^[^@]+@[^@]+\.[^@]+$' },
            name: { bsonType: 'string', minLength: 1, maxLength: 255 },
            status: { enum: ['active', 'inactive', 'suspended', 'deleted'] },
            risk_score: { bsonType: 'int', minimum: 0, maximum: 100 },
            department: { bsonType: 'string' },
            last_activity: { bsonType: 'date' },
            created_at: { bsonType: 'date' }
          }
        }
      },
      validationLevel: 'strict',
      validationAction: 'error'
    });
    
    db.createCollection('audit_logs', {
      validator: {
        $jsonSchema: {
          bsonType: 'object',
          required: ['log_id', 'timestamp', 'action', 'user_id'],
          properties: {
            log_id: { bsonType: 'string' },
            timestamp: { bsonType: 'date' },
            action: { bsonType: 'string' },
            user_id: { bsonType: 'string' },
            resource: { bsonType: 'string' },
            result: { enum: ['success', 'failure', 'error'] },
            ip_address: { bsonType: 'string' },
            user_agent: { bsonType: 'string' }
          }
        }
      },
      validationLevel: 'strict',
      validationAction: 'error'
    });
    
    // Create comprehensive indexes for performance
    db.test_results.createIndex({ test_id: 1 }, { unique: true });
    db.test_results.createIndex({ timestamp: -1 });
    db.test_results.createIndex({ status: 1, environment: 1 });
    db.test_results.createIndex({ test_suite: 1, timestamp: -1 });
    db.test_results.createIndex({ tags: 1 });
    
    db.security_events.createIndex({ event_id: 1 }, { unique: true });
    db.security_events.createIndex({ timestamp: -1 });
    db.security_events.createIndex({ event_type: 1, severity: 1 });
    db.security_events.createIndex({ user_id: 1, timestamp: -1 });
    db.security_events.createIndex({ processed: 1, archived: 1 });
    
    db.policies.createIndex({ policy_id: 1 }, { unique: true });
    db.policies.createIndex({ type: 1, enabled: 1 });
    db.policies.createIndex({ version: -1 });
    db.policies.createIndex({ created_by: 1, created_at: -1 });
    
    db.users.createIndex({ user_id: 1 }, { unique: true });
    db.users.createIndex({ email: 1 }, { unique: true });
    db.users.createIndex({ status: 1, risk_score: -1 });
    db.users.createIndex({ department: 1, status: 1 });
    db.users.createIndex({ last_activity: -1 });
    
    db.audit_logs.createIndex({ log_id: 1 }, { unique: true });
    db.audit_logs.createIndex({ timestamp: -1 });
    db.audit_logs.createIndex({ user_id: 1, timestamp: -1 });
    db.audit_logs.createIndex({ action: 1, result: 1 });
    
    // Create TTL indexes for data retention
    db.security_events.createIndex({ timestamp: 1 }, { expireAfterSeconds: 7776000 }); // 90 days
    db.audit_logs.createIndex({ timestamp: 1 }, { expireAfterSeconds: 15552000 }); // 180 days
    
    // Create admin user with enhanced security
    db = db.getSiblingDB('admin');
    db.createUser({
      user: 'staging_admin',
      pwd: passwordPrompt(),
      roles: [
        { role: 'root', db: 'admin' }
      ],
      passwordDigestor: 'server'
    });
    
    // Create application users with specific roles
    db = db.getSiblingDB('netskope_staging');
    
    // Read-write user for application
    db.createUser({
      user: 'netskope_app',
      pwd: passwordPrompt(),
      roles: [
        { role: 'readWrite', db: 'netskope_staging' }
      ],
      passwordDigestor: 'server'
    });
    
    // Read-only user for monitoring
    db.createUser({
      user: 'netskope_monitor',
      pwd: passwordPrompt(),
      roles: [
        { role: 'read', db: 'netskope_staging' },
        { role: 'clusterMonitor', db: 'admin' }
      ],
      passwordDigestor: 'server'
    });
    
    // Backup user
    db.createUser({
      user: 'netskope_backup',
      pwd: passwordPrompt(),
      roles: [
        { role: 'backup', db: 'admin' },
        { role: 'read', db: 'netskope_staging' }
      ],
      passwordDigestor: 'server'
    });
    
    print('MongoDB HA initialization completed successfully');
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb-ha-cluster
  namespace: netskope-staging
  labels:
    app: mongodb-ha
    environment: staging
spec:
  serviceName: mongodb-ha-headless
  replicas: 5
  selector:
    matchLabels:
      app: mongodb-ha
  template:
    metadata:
      labels:
        app: mongodb-ha
        environment: staging
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9216"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
      - name: mongodb
        image: mongo:6
        ports:
        - containerPort: 27017
          name: mongodb
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: "staging_admin"
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-ha-secret
              key: root-password
        - name: MONGO_INITDB_DATABASE
          value: "netskope_staging"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        command:
        - mongod
        - --replSet
        - rs0
        - --bind_ip_all
        - --auth
        - --keyFile
        - /etc/mongodb/keyfile
        - --wiredTigerCacheSizeGB
        - "2"
        - --slowms
        - "100"
        - --profile
        - "1"
        - --oplogSize
        - "1024"
        volumeMounts:
        - name: mongodb-ha-data
          mountPath: /data/db
        - name: mongodb-ha-init
          mountPath: /docker-entrypoint-initdb.d
        - name: mongodb-keyfile
          mountPath: /etc/mongodb
          readOnly: true
        resources:
          requests:
            cpu: 1
            memory: 4Gi
          limits:
            cpu: 4
            memory: 8Gi
        livenessProbe:
          exec:
            command:
            - mongosh
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          exec:
            command:
            - mongosh
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
      - name: mongodb-exporter
        image: percona/mongodb_exporter:0.39
        ports:
        - containerPort: 9216
          name: metrics
        env:
        - name: MONGODB_URI
          value: "mongodb://netskope_monitor:$(MONGODB_MONITOR_PASSWORD)@localhost:27017/netskope_staging"
        - name: MONGODB_MONITOR_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-ha-secret
              key: monitor-password
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
      volumes:
      - name: mongodb-ha-init
        configMap:
          name: mongodb-ha-init
      - name: mongodb-keyfile
        secret:
          secretName: mongodb-ha-secret
          items:
          - key: keyfile
            path: keyfile
            mode: 0400
      initContainers:
      - name: init-replica-set
        image: mongo:6
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: "staging_admin"
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-ha-secret
              key: root-password
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        command:
        - sh
        - -c
        - |
          sleep 30
          if [ "$(echo $POD_NAME | sed 's/.*-//')" = "0" ]; then
            echo "Initializing replica set..."
            mongosh --username $MONGO_INITDB_ROOT_USERNAME --password $MONGO_INITDB_ROOT_PASSWORD --eval "
              rs.initiate({
                _id: 'rs0',
                members: [
                  { _id: 0, host: 'mongodb-ha-cluster-0.mongodb-ha-headless:27017', priority: 2 },
                  { _id: 1, host: 'mongodb-ha-cluster-1.mongodb-ha-headless:27017', priority: 1 },
                  { _id: 2, host: 'mongodb-ha-cluster-2.mongodb-ha-headless:27017', priority: 1 },
                  { _id: 3, host: 'mongodb-ha-cluster-3.mongodb-ha-headless:27017', priority: 0.5 },
                  { _id: 4, host: 'mongodb-ha-cluster-4.mongodb-ha-headless:27017', priority: 0.5, arbiterOnly: true }
                ]
              })
            "
            echo "Replica set initialized"
          else
            echo "Waiting for primary to initialize replica set..."
            sleep 60
          fi
  volumeClaimTemplates:
  - metadata:
      name: mongodb-ha-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: fast-ssd
      resources:
        requests:
          storage: 100Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-ha-headless
  namespace: netskope-staging
  labels:
    app: mongodb-ha
spec:
  clusterIP: None
  ports:
  - port: 27017
    name: mongodb
  - port: 9216
    name: metrics
  selector:
    app: mongodb-ha
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-ha-service
  namespace: netskope-staging
  labels:
    app: mongodb-ha
spec:
  type: ClusterIP
  ports:
  - port: 27017
    targetPort: 27017
    name: mongodb
  - port: 9216
    targetPort: 9216
    name: metrics
  selector:
    app: mongodb-ha
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mongodb-backup
  namespace: netskope-staging
  labels:
    app: mongodb-backup
    environment: staging
spec:
  schedule: "0 2 * * *"  # Daily at 2 AM
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: mongodb-backup
            image: mongo:6
            env:
            - name: MONGODB_URI
              value: "mongodb://netskope_backup:$(MONGODB_BACKUP_PASSWORD)@mongodb-ha-service:27017/netskope_staging"
            - name: MONGODB_BACKUP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-ha-secret
                  key: backup-password
            - name: BACKUP_DATE
              value: "$(date +%Y%m%d_%H%M%S)"
            command:
            - sh
            - -c
            - |
              echo "Starting MongoDB backup..."
              mongodump --uri="$MONGODB_URI" --out="/backup/mongodb_backup_$BACKUP_DATE"
              echo "Backup completed: mongodb_backup_$BACKUP_DATE"
              
              # Keep only last 7 days of backups
              find /backup -name "mongodb_backup_*" -type d -mtime +7 -exec rm -rf {} \;
              echo "Old backups cleaned up"
            volumeMounts:
            - name: backup-storage
              mountPath: /backup
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: 1
                memory: 2Gi
          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: mongodb-backup-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-backup-pvc
  namespace: netskope-staging
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 500Gi