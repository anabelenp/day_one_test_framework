apiVersion: v1
kind: Service
metadata:
  name: kafka-ha-service
  namespace: netskope-staging
  labels:
    app: kafka-ha
spec:
  type: ClusterIP
  ports:
  - port: 9092
    targetPort: 9092
    name: sasl
  - port: 9093
    targetPort: 9093
    name: plaintext
  - port: 9308
    targetPort: 9308
    name: metrics
  selector:
    app: kafka-ha