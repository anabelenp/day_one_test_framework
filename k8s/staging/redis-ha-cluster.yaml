apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-ha-config
  namespace: netskope-staging
data:
  redis.conf: |
    # Redis HA Configuration for Staging Environment
    bind 0.0.0.0
    port 6379
    protected-mode yes
    
    # Authentication
    requirepass ${REDIS_PASSWORD}
    masterauth ${REDIS_PASSWORD}
    
    # Memory and persistence
    maxmemory 4gb
    maxmemory-policy allkeys-lru
    save 900 1
    save 300 10
    save 60 10000
    
    # AOF persistence for durability
    appendonly yes
    appendfsync everysec
    no-appendfsync-on-rewrite no
    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 64mb
    
    # Logging
    loglevel notice
    logfile ""
    
    # Performance tuning
    tcp-keepalive 300
    timeout 0
    tcp-backlog 511
    databases 16
    
    # Security
    rename-command FLUSHDB ""
    rename-command FLUSHALL ""
    rename-command DEBUG ""
    rename-command CONFIG "CONFIG_9a8b7c6d5e4f3g2h1i"
    
    # Replication
    replica-serve-stale-data yes
    replica-read-only yes
    repl-diskless-sync no
    repl-diskless-sync-delay 5
    
    # Sentinel configuration
    sentinel announce-ip ${POD_IP}
    sentinel announce-port 26379
  
  sentinel.conf: |
    # Redis Sentinel Configuration
    port 26379
    sentinel monitor mymaster redis-ha-master 6379 2
    sentinel auth-pass mymaster ${REDIS_PASSWORD}
    sentinel down-after-milliseconds mymaster 5000
    sentinel parallel-syncs mymaster 1
    sentinel failover-timeout mymaster 10000
    sentinel deny-scripts-reconfig yes
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-ha-master
  namespace: netskope-staging
  labels:
    app: redis-ha
    role: master
    environment: staging
spec:
  serviceName: redis-ha-master-headless
  replicas: 1
  selector:
    matchLabels:
      app: redis-ha
      role: master
  template:
    metadata:
      labels:
        app: redis-ha
        role: master
        environment: staging
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9121"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
          name: redis
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-ha-secret
              key: password
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        command:
        - sh
        - -c
        - |
          envsubst < /etc/redis/redis.conf > /tmp/redis.conf
          redis-server /tmp/redis.conf
        volumeMounts:
        - name: redis-ha-config
          mountPath: /etc/redis
        - name: redis-ha-data
          mountPath: /data
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2
            memory: 4Gi
        livenessProbe:
          exec:
            command:
            - redis-cli
            - --no-auth-warning
            - -a
            - $(REDIS_PASSWORD)
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command:
            - redis-cli
            - --no-auth-warning
            - -a
            - $(REDIS_PASSWORD)
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
      - name: redis-exporter
        image: oliver006/redis_exporter:v1.45.0
        ports:
        - containerPort: 9121
          name: metrics
        env:
        - name: REDIS_ADDR
          value: "redis://localhost:6379"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-ha-secret
              key: password
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
      volumes:
      - name: redis-ha-config
        configMap:
          name: redis-ha-config
  volumeClaimTemplates:
  - metadata:
      name: redis-ha-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: fast-ssd
      resources:
        requests:
          storage: 20Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-ha-replica
  namespace: netskope-staging
  labels:
    app: redis-ha
    role: replica
    environment: staging
spec:
  serviceName: redis-ha-replica-headless
  replicas: 2
  selector:
    matchLabels:
      app: redis-ha
      role: replica
  template:
    metadata:
      labels:
        app: redis-ha
        role: replica
        environment: staging
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9121"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
          name: redis
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-ha-secret
              key: password
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        command:
        - sh
        - -c
        - |
          envsubst < /etc/redis/redis.conf > /tmp/redis.conf
          echo "replicaof redis-ha-master 6379" >> /tmp/redis.conf
          redis-server /tmp/redis.conf
        volumeMounts:
        - name: redis-ha-config
          mountPath: /etc/redis
        - name: redis-ha-data
          mountPath: /data
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2
            memory: 4Gi
        livenessProbe:
          exec:
            command:
            - redis-cli
            - --no-auth-warning
            - -a
            - $(REDIS_PASSWORD)
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - redis-cli
            - --no-auth-warning
            - -a
            - $(REDIS_PASSWORD)
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
      - name: redis-exporter
        image: oliver006/redis_exporter:v1.45.0
        ports:
        - containerPort: 9121
          name: metrics
        env:
        - name: REDIS_ADDR
          value: "redis://localhost:6379"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-ha-secret
              key: password
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
      volumes:
      - name: redis-ha-config
        configMap:
          name: redis-ha-config
  volumeClaimTemplates:
  - metadata:
      name: redis-ha-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: fast-ssd
      resources:
        requests:
          storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-sentinel
  namespace: netskope-staging
  labels:
    app: redis-sentinel
    environment: staging
spec:
  replicas: 3
  selector:
    matchLabels:
      app: redis-sentinel
  template:
    metadata:
      labels:
        app: redis-sentinel
        environment: staging
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
      containers:
      - name: sentinel
        image: redis:7-alpine
        ports:
        - containerPort: 26379
          name: sentinel
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-ha-secret
              key: password
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        command:
        - sh
        - -c
        - |
          envsubst < /etc/redis/sentinel.conf > /tmp/sentinel.conf
          redis-sentinel /tmp/sentinel.conf
        volumeMounts:
        - name: redis-ha-config
          mountPath: /etc/redis
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          exec:
            command:
            - redis-cli
            - -p
            - "26379"
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - redis-cli
            - -p
            - "26379"
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: redis-ha-config
        configMap:
          name: redis-ha-config
---
apiVersion: v1
kind: Service
metadata:
  name: redis-ha-master-headless
  namespace: netskope-staging
  labels:
    app: redis-ha
    role: master
spec:
  clusterIP: None
  ports:
  - port: 6379
    targetPort: 6379
    name: redis
  - port: 9121
    targetPort: 9121
    name: metrics
  selector:
    app: redis-ha
    role: master
---
apiVersion: v1
kind: Service
metadata:
  name: redis-ha-replica-headless
  namespace: netskope-staging
  labels:
    app: redis-ha
    role: replica
spec:
  clusterIP: None
  ports:
  - port: 6379
    targetPort: 6379
    name: redis
  - port: 9121
    targetPort: 9121
    name: metrics
  selector:
    app: redis-ha
    role: replica
---
apiVersion: v1
kind: Service
metadata:
  name: redis-ha-service
  namespace: netskope-staging
  labels:
    app: redis-ha
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
    name: redis
  - port: 9121
    targetPort: 9121
    name: metrics
  selector:
    app: redis-ha
    role: master
---
apiVersion: v1
kind: Service
metadata:
  name: redis-sentinel-service
  namespace: netskope-staging
  labels:
    app: redis-sentinel
spec:
  type: ClusterIP
  ports:
  - port: 26379
    targetPort: 26379
    name: sentinel
  selector:
    app: redis-sentinel