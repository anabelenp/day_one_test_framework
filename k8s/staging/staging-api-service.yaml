apiVersion: v1
kind: ConfigMap
metadata:
  name: staging-api-config
  namespace: netskope-staging
data:
  config.yaml: |
    # Staging API Configuration - Production-like Environment
    server:
      host: "0.0.0.0"
      port: 8080
      debug: false
      read_timeout: 30
      write_timeout: 30
      idle_timeout: 120
    
    api:
      base_path: "/api/v2"
      rate_limit: 5000  # Higher rate limit for staging
      burst_limit: 1000
      auth_required: true
      jwt_enabled: true
      api_versioning: true
      cors_enabled: true
      
    security:
      tls_enabled: true
      cert_file: "/etc/tls/tls.crt"
      key_file: "/etc/tls/tls.key"
      min_tls_version: "1.2"
      cipher_suites: ["TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384", "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256"]
      
    responses:
      delay_ms: 10  # Minimal delay for staging
      error_rate: 0.001  # Very low error rate (0.1%)
      cache_enabled: true
      cache_ttl: 300
      compression_enabled: true
    
    database:
      connection_pool_size: 50
      max_idle_connections: 10
      connection_timeout: 30
      query_timeout: 15
      
    logging:
      level: "INFO"
      format: "json"
      structured: true
      audit_enabled: true
      
    metrics:
      enabled: true
      port: 9090
      path: "/metrics"
      detailed_metrics: true
      
    tracing:
      enabled: true
      jaeger_endpoint: "http://jaeger-ha-service:14268/api/traces"
      sampling_rate: 0.1
      
    health:
      enabled: true
      path: "/health"
      detailed: true
      
    features:
      async_processing: true
      batch_operations: true
      data_validation: strict
      audit_logging: true
      
  mock_responses.json: |
    {
      "events": {
