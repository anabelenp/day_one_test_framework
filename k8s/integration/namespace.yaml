apiVersion: v1
kind: Namespace
metadata:
  name: netskope-integration
  labels:
    environment: integration
    team: sdet
    framework: netskope-sdet
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: integration-quota
  namespace: netskope-integration
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    persistentvolumeclaims: "10"
    services: "20"
    secrets: "10"
    configmaps: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: integration-limits
  namespace: netskope-integration
spec:
  limits:
  - default:
      cpu: "1"
      memory: "2Gi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    type: Container