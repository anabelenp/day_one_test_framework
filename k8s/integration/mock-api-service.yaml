apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-api-config
  namespace: netskope-integration
data:
  config.yaml: |
    # Mock API Configuration for Integration Environment
    server:
      host: "0.0.0.0"
      port: 8080
      debug: false
    
    api:
      base_path: "/api/v2"
      rate_limit: 1000  # requests per minute
      auth_required: true
      default_api_key: "integration-api-key-2024"
    
    responses:
      delay_ms: 50  # Simulate network latency
      error_rate: 0.01  # 1% error rate for testing
    
    logging:
      level: "INFO"
      format: "json"
    
    metrics:
      enabled: true
      port: 9090
      path: "/metrics"
  
  mock_responses.json: |
    {
      "events": {
        "data": [
          {
            "event_id": "evt_001",
            "timestamp": "2024-12-18T10:00:00Z",
            "event_type": "swg",
            "severity": "medium",
            "user": "test.user@company.com",
            "action": "blocked",
            "url": "malicious-site.com",
            "category": "malware"
          },
          {
            "event_id": "evt_002",
            "timestamp": "2024-12-18T10:05:00Z",
            "event_type": "dlp",
            "severity": "high",
            "user": "admin@company.com",
            "action": "quarantined",
            "file": "sensitive_data.xlsx",
            "violation": "PII detected"
          }
        ],
        "total": 2,
        "page": 1,
        "per_page": 100
      },
      "policies": {
        "data": [
          {
            "policy_id": "pol_001",
            "name": "Block Social Media",
            "type": "swg",
            "enabled": true,
            "rules": [
              {
                "action": "block",
                "categories": ["social_media"],
                "users": ["all"]
              }
            ]
          },
          {
            "policy_id": "pol_002",
            "name": "DLP - Financial Data",
            "type": "dlp",
            "enabled": true,
            "rules": [
              {
                "action": "quarantine",
                "patterns": ["credit_card", "ssn"],
                "severity": "high"
              }
            ]
          }
        ],
        "total": 2
      },
      "users": {
        "data": [
          {
            "user_id": "usr_001",
            "email": "test.user@company.com",
            "name": "Test User",
            "risk_score": 25,
            "status": "active",
            "last_activity": "2024-12-18T09:30:00Z"
          },
          {
            "user_id": "usr_002",
            "email": "admin@company.com",
            "name": "Admin User",
            "risk_score": 10,
            "status": "active",
            "last_activity": "2024-12-18T10:00:00Z"
          }
        ],
        "total": 2
      },
      "alerts": {
        "data": [
          {
            "alert_id": "alt_001",
            "timestamp": "2024-12-18T10:10:00Z",
            "type": "security_incident",
            "severity": "critical",
