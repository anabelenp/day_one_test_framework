---
apiVersion: v1
kind: Namespace
metadata:
  name: netskope-integration
  labels:
    environment: integration
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jaeger-service-account
  namespace: netskope-integration
  labels:
    app: jaeger
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jaeger-role
  namespace: netskope-integration
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps"]
  verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jaeger-role-binding
  namespace: netskope-integration
subjects:
- kind: ServiceAccount
  name: jaeger-service-account
  namespace: netskope-integration
roleRef:
  kind: Role
  name: jaeger-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: jaeger-config
  namespace: netskope-integration
  labels:
    app: jaeger
data:
  jaeger.properties: |
    # Jaeger Configuration
    # Collector configuration
    collector.maxQueueSize=1000
    collector.numWorkers=50
    
    # Agent configuration
    agent.reporter.logSpans=true
    agent.reporter.flushInterval=1000
    agent.reporter.maxQueueSize=10000
    
    # Sampling configuration
    sampler.type=const
    sampler.param=1
    
    # Storage configuration
    spanStorage.type=memory
    
    # UI configuration
    ui.defaultServiceName=netskope-integration
  sampling_strategies.json: |
    {
      "service_strategies": [
        {
          "service": "jaeger-collector",
          "type": "probabilistic",
          "param": 0.1
        },
        {
          "service": "jaeger-query",
          "type": "probabilistic",
          "param": 0.0
        }
      ],
      "default_strategy": {
        "type": "probabilistic",
        "param": 0.1
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: netskope-integration
  labels:
    app: jaeger
    environment: integration
    component: tracing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: jaeger
        environment: integration
        component: tracing
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "16686"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: jaeger-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:1.47
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 16686
          protocol: TCP
          name: ui
        - containerPort: 14268
          protocol: TCP
          name: collector
        - containerPort: 6831
          protocol: UDP
          name: agent-compact
        - containerPort: 6832
          protocol: UDP
          name: agent-binary
        - containerPort: 14250
          protocol: TCP
          name: grpc
        env:
        - name: COLLECTOR_OTLP_ENABLED
          value: "true"
        - name: SPAN_STORAGE_TYPE
          value: "memory"
        - name: COLLECTOR_ZIPKIN_HOST_PORT
          value: ":9411"
        - name: JAEGER_SERVICE_NAME
          value: "jaeger-netskope-integration"
        - name: JAEGER_AGENT_HOST
          value: "localhost"
        - name: JAEGER_AGENT_PORT
          value: "6831"
        - name: JAEGER_SAMPLER_TYPE
          value: "const"
        - name: JAEGER_SAMPLER_PARAM
          value: "1"
        - name: JAEGER_REPORTER_LOG_SPANS
          value: "true"
        - name: JAEGER_REPORTER_MAX_QUEUE_SIZE
          value: "10000"
        - name: JAEGER_REPORTER_FLUSH_INTERVAL
          value: "1000ms"
        - name: JAEGER_DISABLED
          value: "false"
        - name: LOG_LEVEL
          value: "info"
        - name: TRACING_SERVICE_NAME
          value: "jaeger-collector"
        volumeMounts:
        - name: jaeger-config
          mountPath: /etc/jaeger
          readOnly: true
        - name: jaeger-data
          mountPath: /var/lib/jaeger
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /
            port: 16686
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 16686
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: jaeger-config
        configMap:
          name: jaeger-config
      - name: jaeger-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-service
  namespace: netskope-integration
  labels:
    app: jaeger
    environment: integration
    component: tracing
spec:
  type: ClusterIP
  ports:
  - name: ui
    port: 16686
    targetPort: 16686
    protocol: TCP
  - name: collector
    port: 14268
    targetPort: 14268
    protocol: TCP
  - name: grpc
    port: 14250
    targetPort: 14250
    protocol: TCP
  - name: agent-compact
    port: 6831
    targetPort: 6831
    protocol: UDP
  - name: agent-binary
    port: 6832
    targetPort: 6832
    protocol: UDP
  selector:
    app: jaeger
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-headless
  namespace: netskope-integration
  labels:
    app: jaeger
    environment: integration
spec:
  clusterIP: None
  ports:
  - name: collector
    port: 14268
    targetPort: 14268
    protocol: TCP
  - name: grpc
    port: 14250
    targetPort: 14250
    protocol: TCP
  selector:
    app: jaeger
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jaeger-ingress
  namespace: netskope-integration
  labels:
    app: jaeger
    environment: integration
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: jaeger.netskope-integration.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: jaeger-service
            port:
              number: 16686
  tls:
  - hosts:
    - jaeger.netskope-integration.local
    secretName: jaeger-tls
---
apiVersion: v1
kind: Secret
metadata:
  name: jaeger-tls
  namespace: netskope-integration
type: kubernetes.io/tls
data:
  # Base64 encoded certificate (replace with actual cert)
  # Use: echo -n "cert" | base64
  tls.crt: ""
  tls.key: ""
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jaeger-data-pvc
  namespace: netskope-integration
  labels:
    app: jaeger
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard