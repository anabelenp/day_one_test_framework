name: DLP Test Suite

on:
  push:
    paths:
      - 'tests/dlp/**'
      - 'config/**'
      - '.github/workflows/dlp-tests.yml'
  pull_request:
    paths:
      - 'tests/dlp/**'
      - 'config/**'

jobs:
  dlp-mock:
    name: DLP - Mock Mode
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest pytest-html || true

      - name: Run DLP tests (mock)
        env:
          TESTING_MODE: mock
        run: |
          python -m pytest tests/dlp -v --junitxml=reports/dlp-mock-results.xml || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dlp-mock-results
          path: reports/dlp-mock-results.xml

  dlp-integration:
    name: DLP - Integration Mode
    runs-on: ubuntu-latest
    needs: dlp-mock
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start local services (docker compose)
        run: |
          docker compose -f docker-compose.local.yml up -d
          # wait a bit for services to become ready
          sleep 20

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest pytest-html || true

      - name: Run DLP tests (integration)
        env:
          TESTING_MODE: local
        run: |
          python -m pytest tests/dlp -v --junitxml=reports/dlp-integration-results.xml || true

      - name: Collect docker logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.local.yml ps || true
          docker compose -f docker-compose.local.yml logs --tail=200 || true

      - name: Tear down local services
        if: always()
        run: docker compose -f docker-compose.local.yml down -v || true

      - name: Upload integration results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dlp-integration-results
          path: reports/dlp-integration-results.xml
