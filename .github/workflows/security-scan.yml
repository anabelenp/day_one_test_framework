name: Security Scans

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security scans daily at 3 AM UTC
    - cron: '0 3 * * *'

jobs:
  sast-bandit:
    name: SAST - Bandit
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Bandit
      run: |
        pip install bandit[toml]

    - name: Run Bandit security scan
      run: |
        bandit -r src/ tests/ -f json -o reports/bandit-report.json || true
        bandit -r src/ tests/ -f html -o reports/bandit-report.html || true
        bandit -r src/ tests/ -ll -i  # Show issues, fail on medium/high

    - name: Upload Bandit results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: bandit-results
        path: reports/bandit-report.*

  sast-semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Semgrep
      uses: returntocorp/semgrep-action@v1
      with:
        config: >-
          p/security-audit
          p/python
          p/owasp-top-ten
          p/secrets
        generateSarif: true

    - name: Upload Semgrep SARIF
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: semgrep.sarif

  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install safety pip-audit

    - name: Run Safety check
      run: |
        safety check --json --output reports/safety-report.json || true
        safety check --full-report || true

    - name: Run pip-audit
      run: |
        pip-audit --desc --format json --output reports/pip-audit-report.json || true
        pip-audit --desc || true

    - name: Upload dependency scan results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: dependency-scan-results
        path: reports/

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for secret scanning

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install TruffleHog
      run: |
        pip install truffleHog3

    - name: Run TruffleHog secret scan
      run: |
        trufflehog3 --format json --output reports/trufflehog-report.json . || true
        trufflehog3 . || true

    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload secret scan results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: secret-scan-results
        path: reports/

  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v2
      with:
        languages: python
        queries: security-and-quality

    - name: Autobuild
      uses: github/codeql-action/autobuild@v2

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [sast-bandit, sast-semgrep, dependency-scan, secret-scan, codeql-analysis]
    if: always()
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v3

    - name: Create security summary
      run: |
        echo "# Security Scan Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Scan Results" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ SAST (Bandit): ${{ needs.sast-bandit.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ SAST (Semgrep): ${{ needs.sast-semgrep.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Dependency Scan: ${{ needs.dependency-scan.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Secret Scan: ${{ needs.secret-scan.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ CodeQL Analysis: ${{ needs.codeql-analysis.result }}" >> $GITHUB_STEP_SUMMARY

    - name: Fail if any security scan failed
      if: |
        needs.sast-bandit.result == 'failure' ||
        needs.sast-semgrep.result == 'failure' ||
        needs.dependency-scan.result == 'failure' ||
        needs.secret-scan.result == 'failure' ||
        needs.codeql-analysis.result == 'failure'
      run: |
        echo "One or more security scans failed!"
        exit 1