name: Deployment Pipeline

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'integration'
        type: choice
        options:
        - integration
        - staging
      force_deploy:
        description: 'Force deployment (skip some checks)'
        required: false
        default: false
        type: boolean

jobs:
  pre-deployment-checks:
    name: Pre-deployment Checks
    runs-on: ubuntu-latest
    outputs:
      deploy_integration: ${{ steps.check.outputs.deploy_integration }}
      deploy_staging: ${{ steps.check.outputs.deploy_staging }}
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Determine deployment targets
      id: check
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          if [[ "${{ github.event.inputs.environment }}" == "integration" ]]; then
            echo "deploy_integration=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.inputs.environment }}" == "staging" ]]; then
            echo "deploy_staging=true" >> $GITHUB_OUTPUT
          fi
        elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
          echo "deploy_integration=true" >> $GITHUB_OUTPUT
        elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          echo "deploy_staging=true" >> $GITHUB_OUTPUT
        fi

  deploy-integration:
    name: Deploy to Integration Environment
    runs-on: ubuntu-latest
    needs: pre-deployment-checks
    if: needs.pre-deployment-checks.outputs.deploy_integration == 'true'
    environment: integration
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -e .
        pip install kubernetes

    - name: Configure kubectl
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG_INTEGRATION }}" | base64 -d > ~/.kube/config
        chmod 600 ~/.kube/config

    - name: Verify cluster access
      run: |
        kubectl cluster-info
        kubectl get nodes

    - name: Deploy to Integration Environment
      run: |
        python scripts/deploy_integration.py --namespace netskope-integration --wait

    - name: Wait for deployment to be ready
      run: |
        kubectl wait --for=condition=available --timeout=600s deployment -n netskope-integration --all

    - name: Run smoke tests
      run: |
        python -c "
        import sys
        sys.path.insert(0, 'src')
        from environment_manager import EnvironmentManager
        from service_manager import ServiceManager
        
        # Set environment to integration
        env_manager = EnvironmentManager()
        env_manager.set_environment_override('integration')
        
        # Test service connectivity
        service_manager = ServiceManager()
        health = service_manager.health_check_all()
        
        print(f'Integration environment health: {health}')
        
        if not all(health.values()):
            print(' Some services are unhealthy')
            sys.exit(1)
        else:
            print(' All services healthy')
        "

    - name: Run integration tests
      run: |
        pytest tests/integration/ -v --tb=short -x

    - name: Get deployment info
      if: always()
      run: |
        echo "## Integration Deployment Status" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        kubectl get pods -n netskope-integration -o wide >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        kubectl get services -n netskope-integration >> $GITHUB_STEP_SUMMARY

  deploy-staging:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest
    needs: pre-deployment-checks
    if: needs.pre-deployment-checks.outputs.deploy_staging == 'true'
    environment: staging
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -e .
        pip install kubernetes

    - name: Configure kubectl
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config
        chmod 600 ~/.kube/config

    - name: Verify cluster access
      run: |
        kubectl cluster-info
        kubectl get nodes

    - name: Deploy to Staging Environment
      run: |
        python scripts/deploy_staging.py --namespace netskope-staging --wait

    - name: Wait for HA deployment to be ready
      run: |
        # Wait longer for HA deployment
        kubectl wait --for=condition=available --timeout=900s deployment -n netskope-staging --all
        kubectl wait --for=condition=ready --timeout=900s statefulset -n netskope-staging --all

    - name: Verify HA configuration
      run: |
        echo "Verifying High Availability setup..."
        
        # Check Redis HA
        kubectl get pods -n netskope-staging -l app=redis-ha
        
        # Check Kafka HA
        kubectl get pods -n netskope-staging -l app=kafka-ha
        
        # Check MongoDB HA
        kubectl get pods -n netskope-staging -l app=mongodb-ha

    - name: Run staging tests
      run: |
        pytest tests/staging/ -v --tb=short -x

    - name: Run load tests
      run: |
        pytest tests/performance/ -v --tb=short -m "not slow"

    - name: Get deployment info
      if: always()
      run: |
        echo "## Staging Deployment Status" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        kubectl get pods -n netskope-staging -o wide >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        kubectl get services -n netskope-staging >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        kubectl get pvc -n netskope-staging >> $GITHUB_STEP_SUMMARY

  notify-deployment:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-integration, deploy-staging]
    if: always()
    
    steps:
    - name: Notify success
      if: |
        (needs.deploy-integration.result == 'success' || needs.deploy-integration.result == 'skipped') &&
        (needs.deploy-staging.result == 'success' || needs.deploy-staging.result == 'skipped')
      run: |
        echo " Deployment completed successfully"

    - name: Notify failure
      if: |
        needs.deploy-integration.result == 'failure' ||
        needs.deploy-staging.result == 'failure'
      run: |
        echo " Deployment failed"
        exit 1