name: Unit Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  COVERAGE_THRESHOLD: 80

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, 3.10, 3.11, 3.12]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-cov pytest-html pytest-xvfb allure-pytest

    - name: Verify framework installation
      run: |
        python -c "from src.environment_manager import get_current_environment; print(f'Environment: {get_current_environment().value}')"

    - name: Run unit tests
      run: |
        pytest tests/unit/ -v \
          --cov=src \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term-missing \
          --html=reports/unit-test-report.html \
          --self-contained-html \
          --junitxml=reports/unit-test-results.xml \
          --alluredir=reports/allure-results

    - name: Check coverage threshold
      run: |
        python scripts/check_coverage.py --threshold $COVERAGE_THRESHOLD

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: unit-test-results-${{ matrix.python-version }}
        path: |
          reports/
          htmlcov/

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: matrix.python-version == '3.12'
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

    - name: Comment PR with test results
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request' && matrix.python-version == '3.12'
      with:
        script: |
          const fs = require('fs');
          if (fs.existsSync('reports/unit-test-results.xml')) {
            const testResults = fs.readFileSync('reports/unit-test-results.xml', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Unit tests completed for Python ${{ matrix.python-version }}'
            });
          }